<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#101622" />
  <title>Devis gratuit — Garage de la Chapelle</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="assets/css/mobile.css" />
</head>

<body>
  <script src="assets/js/nav.js" data-page="devis"></script>
  <script src="assets/js/vehicules-data.js"></script>

  <main class="page-content">
    <div class="page-title-block">
      <h1>Devis Gratuit</h1>
      <p>Remplissez le formulaire — réponse sous <strong>24h</strong>, 100% sans engagement.</p>
    </div>

    <div class="alert info"><span class="material-symbols-outlined">info</span> Devis gratuit et sans engagement. Nos
      experts vous recontactent rapidement.</div>

    <form style="display:grid;gap:1rem;" class="devis-grid"
      onsubmit="event.preventDefault(); alert('✅ Votre demande a bien été envoyée !\n\nNous vous contacterons dans les 24h.'); this.reset();">
      <div class="form-block">
        <h3>Vos informations</h3>
        <div class="form-group"><label class="form-label">Prénom *</label><input type="text" class="form-input"
            id="dv-first" placeholder="Jean" required /></div>
        <div class="form-group"><label class="form-label">Nom *</label><input type="text" class="form-input"
            id="dv-last" placeholder="Dupont" required /></div>
        <div class="form-group"><label class="form-label">Téléphone *</label><input type="tel" class="form-input"
            id="dv-phone" placeholder="06 12 34 56 78" required /></div>
        <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input"
            id="dv-email" placeholder="jean@email.fr" /></div>
      </div>

      <div class="form-block">
        <h3>Votre véhicule</h3>
        <div class="form-group" id="dv-myveh-group" style="display:none;">
          <label class="form-label">Mes véhicules enregistrés</label>
          <select class="form-select" id="dv-myveh" onchange="applyMyVehicle()"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Marque *</label>
          <select class="form-select" id="dv-brand" required>
            <option value="">Sélectionnez…</option>
            <option>Peugeot</option>
            <option>Renault</option>
            <option>Citroën</option>
            <option>Dacia</option>
            <option>Volkswagen</option>
            <option>Audi</option>
            <option>BMW</option>
            <option>Mercedes</option>
            <option>Opel</option>
            <option>Ford</option>
            <option>Fiat</option>
            <option>Toyota</option>
            <option>Nissan</option>
            <option>Kia</option>
            <option>Hyundai</option>
            <option>Seat</option>
            <option>Skoda</option>
            <option>Autre</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Modèle *</label>
          <select class="form-select" id="dv-model-select" style="display:none;margin-bottom:.4rem;"></select>
          <input type="text" class="form-input" id="dv-model" placeholder="208, Clio…" required />
        </div>
        <div class="form-group"><label class="form-label">Année</label><input type="number" class="form-input"
            id="dv-year" placeholder="2019" min="1980" max="2026" /></div>
        <div class="form-group"><label class="form-label">Kilométrage</label><input type="number" class="form-input"
            id="dv-km" placeholder="85 000" /></div>
      </div>

      <div class="form-block">
        <h3>Type d'intervention</h3>
        <div class="form-group">
          <label class="form-label">Service demandé *</label>
          <select class="form-select" required>
            <option value="">Choisissez…</option>
            <option>Diagnostic complet</option>
            <option>Révision / Vidange</option>
            <option>Freinage</option>
            <option>Pneumatiques</option>
            <option>Climatisation</option>
            <option>Électronique / Batterie</option>
            <option>Embrayage / Boîte de vitesses</option>
            <option>Carrosserie</option>
            <option>Contrôle technique préparatoire</option>
            <option>Autre</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Décrivez votre problème</label><textarea class="form-textarea"
            placeholder="Bruits, voyants, symptômes…"></textarea></div>
      </div>

      <button type="submit" class="btn-primary btn-full">
        <span class="material-symbols-outlined">send</span>
        Envoyer ma demande de devis
      </button>
    </form>
    <p style="text-align:center;font-size:.72rem;color:var(--text-3);margin-top:.75rem">Données protégées · RGPD</p>
  </main>

  <style>
    @media (min-width:900px) {
      .devis-grid {
        grid-template-columns: 1fr 1fr;
      }

      .devis-grid> :last-child {
        grid-column: 1 / -1;
      }
    }
  </style>

  <script>
    // Pré-remplissage automatique depuis le profil client et ses véhicules
    let modelPicker = null;

    function applyMyVehicle() {
      const vehicles = GLC.getVehicles();
      const idx = parseInt(document.getElementById('dv-myveh').value, 10);
      const v = vehicles[idx];
      if (!v) return;
      const brandSelect = document.getElementById('dv-brand');
      const known = [...brandSelect.options].some(o => o.value === v.brand || o.text === v.brand);
      brandSelect.value = known ? v.brand : 'Autre';
      if (modelPicker) modelPicker.refresh(v.model || '');
      document.getElementById('dv-year').value = v.year || '';
      document.getElementById('dv-km').value = (v.km || '').replace(/\s/g, '');
    }

    document.addEventListener('DOMContentLoaded', () => {
      modelPicker = setupModelPicker(
        document.getElementById('dv-brand'),
        document.getElementById('dv-model-select'),
        document.getElementById('dv-model'));
      const me = GLC.userIdentity();
      if (me) {
        document.getElementById('dv-first').value = me.first;
        document.getElementById('dv-last').value = me.last;
        document.getElementById('dv-phone').value = me.phone;
        document.getElementById('dv-email').value = me.email;
      }
      const vehicles = me ? GLC.getVehicles() : [];
      if (vehicles.length > 0) {
        const sel = document.getElementById('dv-myveh');
        sel.innerHTML = vehicles.map((v, i) =>
          `<option value="${i}">${v.brand} ${v.model}${v.year ? ' — ' + v.year : ''}${v.plate ? ' (' + v.plate + ')' : ''}</option>`).join('');
        document.getElementById('dv-myveh-group').style.display = '';
        applyMyVehicle();
      }
    });
  </script>
</body>

</html>
