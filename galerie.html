<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#101622" />
  <title>Galerie — Garage de la Chapelle</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="assets/css/mobile.css" />
</head>

<body>
  <script src="assets/js/nav.js" data-page="galerie"></script>

  <main class="page-content">

    <div class="page-title-block">
      <h1>Galerie</h1>
      <p>Découvrez notre atelier et nos réalisations en images.</p>
    </div>

    <div class="category-chips" id="gallery-chips">
      <div class="chip active" onclick="filterGallery(this,'all')">Tout</div>
      <div class="chip" onclick="filterGallery(this,'atelier')">Atelier</div>
      <div class="chip" onclick="filterGallery(this,'reparation')">Réparations</div>
      <div class="chip" onclick="filterGallery(this,'vehicule')">Véhicules</div>
    </div>

    <div class="gallery-grid">
      <div class="gallery-item" data-cat="atelier" onclick="openLightbox(this)">
        <img
          src="assets/img/galerie-atelier.svg"
          alt="Atelier principal" />
        <div class="overlay"><span class="material-symbols-outlined">zoom_in</span></div>
      </div>
      <div class="gallery-item" data-cat="reparation" onclick="openLightbox(this)">
        <img
          src="assets/img/galerie-diagnostic.svg"
          alt="Diagnostic" />
        <div class="overlay"><span class="material-symbols-outlined">zoom_in</span></div>
      </div>
      <div class="gallery-item" data-cat="reparation" onclick="openLightbox(this)">
        <img
          src="assets/img/galerie-reparation.svg"
          alt="Réparation" />
        <div class="overlay"><span class="material-symbols-outlined">zoom_in</span></div>
      </div>
      <div class="gallery-item" data-cat="atelier" onclick="openLightbox(this)">
        <img
          src="assets/img/galerie-equipement.svg"
          alt="Équipement" />
        <div class="overlay"><span class="material-symbols-outlined">zoom_in</span></div>
      </div>
      <div class="gallery-item" data-cat="vehicule" onclick="openLightbox(this)">
        <img
          src="assets/img/galerie-vehicule.svg"
          alt="Véhicule" />
        <div class="overlay"><span class="material-symbols-outlined">zoom_in</span></div>
      </div>
      <div class="gallery-item" data-cat="vehicule" onclick="openLightbox(this)">
        <img
          src="assets/img/galerie-remise-cles.svg"
          alt="Client" />
        <div class="overlay"><span class="material-symbols-outlined">zoom_in</span></div>
      </div>
      <div class="gallery-item" data-cat="atelier" onclick="openLightbox(this)">
        <img
          src="assets/img/galerie-levage.svg"
          alt="Atelier 2" />
        <div class="overlay"><span class="material-symbols-outlined">zoom_in</span></div>
      </div>
      <div class="gallery-item" data-cat="reparation" onclick="openLightbox(this)">
        <img
          src="assets/img/galerie-peinture.svg"
          alt="Outil" />
        <div class="overlay"><span class="material-symbols-outlined">zoom_in</span></div>
      </div>
    </div>

    <a class="btn-primary btn-full" href="rendez-vous.html">
      <span class="material-symbols-outlined">calendar_month</span>
      Prendre rendez-vous
    </a>

  </main>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lb-close" onclick="closeLightbox()">✕</button>
    <img id="lb-img" src="" alt="" />
  </div>

  <script>
    function openLightbox(el) {
      document.getElementById('lb-img').src = el.querySelector('img').src;
      document.getElementById('lightbox').classList.add('open');
    }
    function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
    function filterGallery(el, cat) {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      document.querySelectorAll('.gallery-item').forEach(item => {
        item.style.display = (cat === 'all' || item.dataset.cat === cat) ? '' : 'none';
      });
    }
  </script>
</body>

</html>
