<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#101622" />
    <title>Mes Véhicules — Garage de la Chapelle</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="assets/css/mobile.css" />
    <style>
        .veh-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: .75rem;
        }

        .veh-img {
            height: 140px;
            background: var(--bg-card2);
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .veh-badge {
            position: absolute;
            top: .75rem;
            left: .75rem;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .veh-body {
            padding: 1rem;
        }

        .veh-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .veh-plate {
            display: inline-block;
            padding: 2px 8px;
            background: var(--bg-card2);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: monospace;
            font-weight: 700;
            font-size: .8rem;
            margin-bottom: .5rem;
        }

        .veh-meta {
            font-size: .78rem;
            color: var(--text-2);
            display: flex;
            align-items: center;
            gap: .4rem;
            margin-bottom: .75rem;
        }

        .vehicles-grid {
            display: grid;
            gap: .75rem;
        }

        @media(min-width:900px) {
            .vehicles-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>
    <script src="assets/js/nav.js" data-page="profile"></script>

    <main class="page-content">

        <div class="page-title-block">
            <h1>Mes Véhicules</h1>
            <p>Gérez votre parc automobile et consultez l'historique de vos entretiens.</p>
        </div>

        <div class="vehicles-grid" id="vehicles-grid"></div>

        <div id="no-vehicles" class="empty-state" style="display:none;">
            <span class="material-symbols-outlined">directions_car</span>
            <h3>Aucun véhicule enregistré</h3>
            <p>Ajoutez votre premier véhicule pour suivre vos entretiens.</p>
        </div>

        <!-- ADD VEHICLE -->
        <a class="profile-menu-item" href="ajouter-vehicule.html"
            style="border:2px dashed var(--border);border-radius:var(--radius-xl);justify-content:center;padding:1.5rem;text-decoration:none;flex-direction:column;gap:.5rem;">
            <div
                style="width:50px;height:50px;border-radius:50%;background:rgba(17,82,212,.1);display:flex;align-items:center;justify-content:center;">
                <span class="material-symbols-outlined" style="color:var(--primary-light)">add</span>
            </div>
            <span style="font-weight:700;color:var(--text)">Ajouter un véhicule</span>
        </a>

    </main>

    <script>
        const VEH_IMAGES = ['assets/img/vehicule-berline.svg', 'assets/img/vehicule-citadine.svg'];

        function renderVehicles() {
            const vehicles = GLC.getVehicles();
            const grid = document.getElementById('vehicles-grid');
            document.getElementById('no-vehicles').style.display = vehicles.length ? 'none' : 'flex';

            grid.innerHTML = vehicles.map((v, i) => `
                <div class="veh-card">
                    <div class="veh-img" style="background-image:url('${VEH_IMAGES[i % VEH_IMAGES.length]}')">
                        <div class="veh-badge" style="background:var(--primary);color:#fff">${v.year || ''}</div>
                    </div>
                    <div class="veh-body">
                        <div class="veh-title">${v.brand} ${v.model}</div>
                        <div class="veh-plate">${v.plate || '—'}</div>
                        <div class="veh-meta">
                            <span class="material-symbols-outlined" style="font-size:14px;color:var(--primary-light)">speed</span>
                            ${v.km ? v.km + ' km' : 'Kilométrage non renseigné'}
                        </div>
                        <div class="veh-meta">
                            <span class="material-symbols-outlined" style="font-size:14px;color:var(--accent-green)">event_available</span>
                            ${v.lastService || 'Aucune intervention enregistrée'}
                        </div>
                        <div style="display:flex;gap:.5rem;">
                            <a class="btn-primary btn-full" href="rendez-vous.html" style="flex:1;">
                                <span class="material-symbols-outlined">calendar_month</span> Prendre RDV</a>
                            <button class="btn-secondary" style="padding:.75rem;" aria-label="Supprimer"
                                onclick="removeVehicle(${i})">
                                <span class="material-symbols-outlined" style="color:var(--accent-red)">delete</span>
                            </button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function removeVehicle(index) {
            if (!confirm('Supprimer ce véhicule ?')) return;
            const vehicles = GLC.getVehicles();
            vehicles.splice(index, 1);
            GLC.saveVehicles(vehicles);
            renderVehicles();
        }

        document.addEventListener('DOMContentLoaded', renderVehicles);
    </script>
</body>

</html>
