<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#101622" />
  <title>Mes rendez-vous — Garage de la Chapelle</title>
  <meta name="description" content="Retrouvez vos rendez-vous pris en ligne au Garage de la Chapelle, Ingré." />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="assets/css/mobile.css" />
</head>

<body>
  <script src="assets/js/nav.js" data-page="rdv"></script>

  <main class="page-content">
    <div class="page-title-block"
      style="display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;">
      <div>
        <h1>Mes rendez-vous</h1>
        <p>Vous trouverez ci-dessous la liste de vos prises de rendez-vous.</p>
      </div>
      <a class="btn-primary" href="rendez-vous.html">
        <span class="material-symbols-outlined">add</span>
        Nouveau RDV
      </a>
    </div>

    <div id="appointments-container"></div>

    <div id="no-appointments" class="empty-state" style="display:none;">
      <span class="material-symbols-outlined">event_busy</span>
      <h3>Aucun rendez-vous pour l'instant</h3>
      <p>Réservez un créneau en quelques clics.</p>
      <a class="btn-primary" href="rendez-vous.html" style="margin-top:1rem;">
        <span class="material-symbols-outlined">calendar_month</span>
        Prendre rendez-vous
      </a>
    </div>
  </main>

  <script>
    const esc = (s) => String(s ?? '').replace(/[&<>"']/g,
      c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

    function getAppointments() {
      try { return JSON.parse(localStorage.getItem('appointments') || '[]'); }
      catch (e) { return []; }
    }

    function renderAppointments() {
      const container = document.getElementById('appointments-container');
      const appts = getAppointments();
      // aucun RDV pris → on emmène directement vers la prise de rendez-vous
      if (appts.length === 0) {
        window.location.replace('rendez-vous.html');
        return;
      }
      document.getElementById('no-appointments').style.display = appts.length ? 'none' : 'flex';

      container.innerHTML = appts.map((a, i) => `
        <div class="info-card">
          <h3><span class="material-symbols-outlined">build</span> ${esc(a.service || 'Intervention')}</h3>
          <div class="info-row">
            <span class="material-symbols-outlined">calendar_month</span>
            <span class="info-label">Date</span>
            <span class="info-value">${esc(a.date)}${a.time ? ' à ' + esc(a.time) : ''}</span>
          </div>
          <div class="info-row">
            <span class="material-symbols-outlined">person</span>
            <span class="info-label">Client</span>
            <span class="info-value">${esc(a.first)} ${esc(a.last)} · ${esc(a.phone)}</span>
          </div>
          ${a.vehicle ? `
          <div class="info-row">
            <span class="material-symbols-outlined">directions_car</span>
            <span class="info-label">Véhicule</span>
            <span class="info-value">${esc(a.vehicle)}</span>
          </div>` : ''}
          ${a.problem ? `
          <div class="info-row">
            <span class="material-symbols-outlined">description</span>
            <span class="info-label">Demande</span>
            <span class="info-value">${esc(a.problem)}</span>
          </div>` : ''}
          <div class="info-row">
            <span class="material-symbols-outlined">location_on</span>
            <span class="info-label">Lieu</span>
            <span class="info-value">164 Rte de la Chapelle, 45140 Ingré</span>
          </div>
          <button class="btn-secondary btn-full" style="margin-top:.75rem;" onclick="cancelAppointment(${i})">
            <span class="material-symbols-outlined" style="color:var(--accent-red)">event_busy</span>
            Annuler ce rendez-vous
          </button>
        </div>`).join('');
    }

    function cancelAppointment(index) {
      if (!confirm('Annuler ce rendez-vous ?')) return;
      const appts = getAppointments();
      appts.splice(index, 1);
      localStorage.setItem('appointments', JSON.stringify(appts));
      renderAppointments();
    }

    document.addEventListener('DOMContentLoaded', renderAppointments);
  </script>
</body>

</html>
