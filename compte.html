<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Connexion / Inscription — Garage la Chapelle</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="assets/css/mobile.css" />
    <style>
        /* Specific styles for the login/register toggle */
        .auth-toggle {
            display: flex;
            background: var(--bg-surface);
            border-radius: 12px;
            padding: 0.25rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
        }

        .auth-toggle-btn {
            flex: 1;
            text-align: center;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            color: var(--text-2);
            cursor: pointer;
            transition: all 0.2s;
        }

        .auth-toggle-btn.active {
            background: var(--primary-light);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .auth-form-container {
            display: none;
        }

        .auth-form-container.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            color: var(--text-1);
            padding: 0.875rem;
            border-radius: 12px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1.5rem;
        }

        .google-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-3);
            font-size: 0.875rem;
            margin: 2rem 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .divider:not(:empty)::before {
            margin-right: 1em;
        }

        .divider:not(:empty)::after {
            margin-left: 1em;
        }

        .icon-header {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <script src="assets/js/nav.js" data-page="compte" data-cart="2"></script>

    <main class="page-content" style="max-width: 500px; margin: 0 auto; padding-top: 2rem;">

        <div class="page-title-block" style="text-align: center;">
            <div class="icon-header">🔑</div>
            <h1 id="page-title">Connexion</h1>
            <p id="page-subtitle">Accédez à votre espace personnel.</p>
        </div>

        <div class="auth-toggle">
            <div class="auth-toggle-btn active" onclick="switchTab('login')">Se connecter</div>
            <div class="auth-toggle-btn" onclick="switchTab('register')">S'inscrire</div>
        </div>

        <!-- LOGIN FORM -->
        <div id="form-login" class="auth-form-container active">
            <form style="display:grid;gap:1.5rem;" class="form-block" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="login-email">Email</label>
                    <input type="email" id="login-email" class="form-input" placeholder="votre@email.com" required
                        oninvalid="this.setCustomValidity('Veuillez renseigner votre email.')"
                        oninput="this.setCustomValidity('')" />
                </div>
                <div class="form-group">
                    <label class="form-label" for="login-password">Mot de passe</label>
                    <input type="password" id="login-password" class="form-input" placeholder="••••••••" required
                        oninvalid="this.setCustomValidity('Veuillez renseigner votre mot de passe.')"
                        oninput="this.setCustomValidity('')" />
                </div>

                <button type="submit" class="btn-primary btn-full">
                    <span class="material-symbols-outlined">login</span>
                    Se connecter
                </button>

                <div style="text-align: center; margin-top: -0.5rem;">
                    <a href="#" style="color: var(--primary-light); text-decoration: none; font-size: 0.9rem;">Mot de
                        passe oublié ?</a>
                </div>
            </form>
        </div>

        <!-- REGISTER FORM -->
        <div id="form-register" class="auth-form-container">
            <form style="display:grid;gap:1.5rem;" class="form-block" onsubmit="handleRegister(event)">

                <div class="form-group">
                    <label class="form-label" for="reg-prenom">Prénom *</label>
                    <input type="text" id="reg-prenom" class="form-input" placeholder="Jean" required
                        oninvalid="this.setCustomValidity('Veuillez renseigner votre prénom.')"
                        oninput="this.setCustomValidity('')" />
                </div>
                <div class="form-group">
                    <label class="form-label" for="reg-nom">Nom *</label>
                    <input type="text" id="reg-nom" class="form-input" placeholder="Dupont" required
                        oninvalid="this.setCustomValidity('Veuillez renseigner votre nom.')"
                        oninput="this.setCustomValidity('')" />
                </div>
                <div class="form-group">
                    <label class="form-label" for="reg-email">Email *</label>
                    <input type="email" id="reg-email" class="form-input" placeholder="votre@email.com" required
                        oninvalid="this.setCustomValidity('Veuillez renseigner un email valide.')"
                        oninput="this.setCustomValidity('')" />
                </div>
                <div class="form-group">
                    <label class="form-label" for="reg-confirm-email">Confirmez l'email *</label>
                    <input type="email" id="reg-confirm-email" class="form-input" placeholder="votre@email.com" required
                        oninvalid="this.setCustomValidity('Veuillez confirmer votre email.')"
                        oninput="this.setCustomValidity('')" />
                </div>
                <div class="form-group">
                    <label class="form-label" for="reg-tel">Téléphone</label>
                    <input type="tel" id="reg-tel" class="form-input" placeholder="06 12 34 56 78" />
                </div>

                <div class="form-group">
                    <label class="form-label" for="reg-password">Mot de passe *</label>
                    <input type="password" id="reg-password" class="form-input" placeholder="••••••••" required
                        minlength="8"
                        oninvalid="this.setCustomValidity('Veuillez renseigner un mot de passe (8 caractères min).')"
                        oninput="this.setCustomValidity('')" />
                </div>
                <div class="form-group">
                    <label class="form-label" for="reg-confirm">Confirmez le mot de passe *</label>
                    <input type="password" id="reg-confirm" class="form-input" placeholder="••••••••" required
                        minlength="8" />
                </div>

                <button type="submit" class="btn-primary btn-full">
                    <span class="material-symbols-outlined">person_add</span>
                    S'inscrire
                </button>
            </form>
        </div>

        <!-- COMMON ELEMENTS -->
        <div class="divider">ou</div>

        <button class="google-btn" onclick="alert('Connexion avec Google non implémentée.')">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                    fill="#4285F4" />
                <path
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                    fill="#34A853" />
                <path
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                    fill="#FBBC05" />
                <path
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                    fill="#EA4335" />
            </svg>
            Continuer avec Google
        </button>

    </main>

    <script>
        function switchTab(tab) {
            // Update buttons
            document.querySelectorAll('.auth-toggle-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Update forms
            document.querySelectorAll('.auth-form-container').forEach(form => form.classList.remove('active'));
            document.getElementById(`form-${tab}`).classList.add('active');

            // Update titles
            const title = document.getElementById('page-title');
            const subtitle = document.getElementById('page-subtitle');
            if (tab === 'login') {
                title.innerText = 'Connexion';
                subtitle.innerText = 'Accédez à votre espace personnel.';
            } else {
                title.innerText = 'Inscription';
                subtitle.innerText = 'Créez votre compte en quelques secondes.';
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            alert('✅ Connexion réussie !\n\nBienvenue dans votre espace personnel.');
            // window.location.href = 'dashboard.html'; // Redirection future
        }

        function handleRegister(e) {
            e.preventDefault();

            const email = document.getElementById('reg-email');
            const confirmEmail = document.getElementById('reg-confirm-email');
            const pwd = document.getElementById('reg-password');
            const confirmPwd = document.getElementById('reg-confirm');

            if (email.value !== confirmEmail.value) {
                confirmEmail.setCustomValidity("Les adresses email ne correspondent pas.");
                confirmEmail.reportValidity();
                return;
            } else {
                confirmEmail.setCustomValidity("");
            }

            if (pwd.value !== confirmPwd.value) {
                confirmPwd.setCustomValidity("Les mots de passe ne correspondent pas.");
                confirmPwd.reportValidity();
                return;
            } else {
                confirmPwd.setCustomValidity("");
            }

            alert('✅ Votre compte a été créé avec succès !\n\nVous êtes maintenant connecté(e).');
            // window.location.href = 'dashboard.html'; // Redirection future
        }

        // Reset custom validity on input for confirm password & email
        document.getElementById('reg-confirm').addEventListener('input', function () {
            this.setCustomValidity('');
        });
        document.getElementById('reg-confirm-email').addEventListener('input', function () {
            this.setCustomValidity('');
        });
    </script>
</body>

</html>
